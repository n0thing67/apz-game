<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>АПЗ — админ-панель</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="admin-body">
  <!-- HOME PAGE -->
  <div id="screen-admin-home" class="screen active admin-screen">
    <div class="admin-wrap">
      <h1>🛠 Админ-панель АПЗ</h1>
      <p class="muted" id="who">Проверка доступа…</p>

      <div class="admin-home">
        <button class="btn admin-home-btn" id="go-stats">📊 Статистика</button>
        <button class="btn admin-home-btn" id="go-users">👥 Пользователи</button>
        <button class="btn admin-home-btn" id="go-levels">🎛 Игры</button>
        <button class="btn admin-home-btn" id="go-awards">🏅 Грамоты</button>
      </div>

      <div class="admin-actions">
        <button class="btn btn-secondary" id="btn-exit">← Выйти</button>
      </div>
    </div>
  </div>

  <!-- STATS PAGE -->
  <div id="screen-admin-stats" class="screen admin-screen" aria-hidden="true">
    <div class="admin-wrap">
      <div class="admin-page-head">
        <div class="admin-page-title">📊 Статистика</div>
      </div>

      <div class="admin-actions">
        <button class="btn" id="btn-refresh-stats">Обновить</button>
        <button class="btn btn-secondary" id="btn-reset-scores-stats">Сбросить всю статистику</button>
      </div>

      <div class="level-card" style="margin:0;">
        <div class="level-title">🏆 Все участники</div>
        <div class="level-stats">
          <pre id="stats-all" style="white-space:pre-wrap; margin:0;">—</pre>
        </div>
      </div>

      <div class="level-card" style="margin-top:12px;">
        <div class="level-title">🧹 Очистить статистику пользователя</div>

        <div class="admin-row" style="margin-top:10px;">
          <input id="reset-user-search" type="text" placeholder="Поиск: имя или фамилия" class="admin-input" />
        </div>

        <div class="level-stats" style="margin-top:10px;">
          <div class="admin-selected" id="reset-user-selected">Не выбран</div>
          <div id="reset-user-list" class="admin-userlist" aria-label="Список пользователей"></div>
          <input id="reset-user-id" type="hidden" />
        </div>

        <div class="admin-actions" style="margin-top:12px;">
          <button class="btn" id="btn-reset-user-scores" disabled>Очистить выбранного</button>
          <button class="btn btn-secondary" id="btn-refresh-reset-user">Подтянуть пользователей</button>
        </div>
      </div>

      <div class="admin-actions" style="margin-top:14px;">
        <button class="btn btn-secondary" id="back-from-stats">← Назад</button>
      </div>
    </div>
  </div>

  <!-- USERS PAGE -->
  <div id="screen-admin-users" class="screen admin-screen" aria-hidden="true">
    <div class="admin-wrap">
      <div class="admin-page-head">
        <div class="admin-page-title">👥 Пользователи</div>
      </div>

      <div class="level-card" style="margin:0;">
        <div class="level-title">Удаление пользователей</div>

        <div class="admin-row" style="margin-top:10px;">
          <input id="users-search" type="text" placeholder="Поиск: имя или фамилия" class="admin-input" />
        </div>

        <div class="level-stats" style="margin-top:10px;">
          <div class="admin-selected" id="users-selected">Не выбран</div>
          <div id="users-list" class="admin-userlist" aria-label="Список пользователей"></div>
          <input id="delete-id" type="hidden" />
        </div>

        <div class="admin-actions" style="margin-top:12px;">
          <button class="btn" id="btn-delete-user" disabled>Удалить выбранного</button>
          <button class="btn btn-secondary" id="btn-delete-all-users">Удалить всех пользователей</button>
        </div>
      </div>

      <div class="admin-actions" style="margin-top:12px;">
        <button class="btn" id="btn-refresh-users">Обновить</button>
      </div>

      <div class="admin-actions" style="margin-top:14px;">
        <button class="btn btn-secondary" id="back-from-users">← Назад</button>
      </div>
    </div>
  </div>

  <!-- LEVELS PAGE -->
  <div id="screen-admin-levels" class="screen admin-screen" aria-hidden="true">
    <div class="admin-wrap">
      <div class="admin-page-head">
        <div class="admin-page-title">🎛 Игры (вкл/выкл)</div>
      </div>

      <div class="admin-actions">
        <button class="btn" id="btn-refresh-levels">Обновить</button>
      </div>

      <div class="level-card" style="margin:0;">
        <div class="level-title">Список игр</div>
        <div id="levels" class="admin-levels"></div>
        </div>
      </div>

      <div class="admin-actions" style="margin-top:14px;">
        <button class="btn btn-secondary" id="back-from-levels">← Назад</button>
      </div>
    </div>
  </div>

  <!-- AWARDS PAGE -->
  <div id="screen-admin-awards" class="screen admin-screen" aria-hidden="true">
    <div class="admin-wrap">
      <div class="admin-page-head">
        <div class="admin-page-title">🏅 Сертификаты</div>
      </div>

      <div class="level-card" style="margin:0;">
        <div class="level-title">Сформировать и отправить</div>

        <div class="admin-row award-top-row" style="gap:10px; flex-wrap:wrap;">
          <input id="award-template" type="hidden" value="participation" />
          <div class="admin-input" style="flex:1; min-width:180px; display:flex; align-items:center; box-sizing:border-box;" aria-readonly="true">Сертификат за участие</div>
          <!-- Desktop: обычный select. Mobile: кастомный пикер (ниже), потому что мобильные WebView не стилизуют <option>. -->
          <select id="award-font" class="admin-input admin-font-select" style="flex:1; min-width:180px;"></select>
          <div id="award-font-mobile" class="admin-font-mobile" style="flex:1; min-width:180px; display:none;"></div>
        </div>

        <div class="admin-row" style="gap:10px; flex-wrap:wrap; margin-top:10px;">
          <input id="award-event" type="text" placeholder="Название мероприятия" class="admin-input" style="flex:2; min-width:240px;" />
          <div class="admin-date-field" style="flex:1; min-width:200px;">
            <input id="award-date" type="date" class="admin-input admin-date-input" />
            <button type="button" class="admin-date-btn" id="award-date-btn" aria-label="Открыть календарь">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1.5A2.5 2.5 0 0 1 22 6.5v13A2.5 2.5 0 0 1 19.5 22h-15A2.5 2.5 0 0 1 2 19.5v-13A2.5 2.5 0 0 1 4.5 4H6V3a1 1 0 0 1 1-1Zm12.5 6H4.5a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h15a.5.5 0 0 0 .5-.5v-11a.5.5 0 0 0-.5-.5ZM6 10h3v3H6v-3Zm0 5h3v3H6v-3Zm5-5h3v3h-3v-3Zm0 5h3v3h-3v-3Zm5-5h3v3h-3v-3Z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Кнопки действий унесены вниз страницы (перед кнопкой "Назад") -->

        <div class="level-stats" style="margin-top:10px;">
          <div class="admin-row" style="margin-top:10px;">
            <input id="awards-search" type="text" placeholder="Поиск: имя или фамилия" class="admin-input" />
          </div>
          <div class="admin-selected" id="awards-selected">Не выбран</div>
          <div id="awards-list" class="admin-userlist" aria-label="Список пользователей для награждения"></div>
        </div>

        <div class="level-stats" style="margin-top:10px;">
          <div class="muted">Превью шаблона:</div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; justify-content:center; width:100%;">
            <img src="assets/cert_templates/sertificat.png" alt="Сертификат" style="width:120px; border-radius:10px;" />
          </div>
        </div>
      </div>

      <!-- Кнопки должны быть внизу, прямо перед "Назад" -->
      <div class="admin-actions admin-actions-bottom" style="margin-top:14px;">
        <button class="btn" id="btn-award-send">Сформировать и отправить</button>
        <button class="btn btn-secondary" id="btn-award-clear">Очистить поля</button>
        <button class="btn btn-secondary" id="btn-award-refresh">Подтянуть пользователей</button>
      </div>

      <div class="admin-actions" style="margin-top:12px;">
        <button class="btn btn-secondary" id="back-from-awards">← Назад</button>
      </div>
    </div>
  </div>


  <script src="admin.js"></script>
</body>
</html>
